<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Inbox RL Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --active-nav: #eef2ff;
            --white: #ffffff;
            --success: #22c55e;
            --danger: #ef4444;
            --sidebar-width: 260px;
            --list-width: 380px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 0;
            z-index: 10;
        }

        .logo {
            padding: 0 24px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent-color);
        }

        .nav-items {
            flex: 1;
        }

        .nav-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            color: var(--accent-color);
            background: var(--active-nav);
        }

        .nav-item.active {
            color: var(--accent-color);
            background: var(--active-nav);
            border-left-color: var(--accent-color);
        }

        .stats-section {
            padding: 24px;
            border-top: 1px solid var(--border-color);
        }

        .stat-card {
            background: var(--active-nav);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Center Panel - Email List */
        .email-list-panel {
            width: var(--list-width);
            background: var(--white);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .search-box {
            padding: 16px 24px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px 10px 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            font-size: 0.875rem;
            outline: none;
        }

        .search-box i {
            position: absolute;
            left: 36px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            width: 16px;
            height: 16px;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
        }

        .email-item {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .email-item:hover {
            background: #f1f5f9;
        }

        .email-item.active {
            background: var(--active-nav);
            border-right: 3px solid var(--accent-color);
        }

        .email-item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .sender {
            font-weight: 600;
            font-size: 0.9375rem;
        }

        .time {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .subject {
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .snippet {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 8px;
        }

        .tag-important { background: #fee2e2; color: #ef4444; }

        /* Right Panel - Email Content */
        .email-reader {
            flex: 1;
            background: var(--white);
            display: flex;
            flex-direction: column;
        }

        .reader-toolbar {
            padding: 16px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
            background: var(--white);
            color: var(--text-primary);
        }

        .btn:hover {
            background: var(--bg-color);
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--white);
            border-color: var(--accent-color);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-danger:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: #fef2f2;
        }

        .reader-content {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .reader-header {
            margin-bottom: 32px;
        }

        .reader-subject {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .sender-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--active-nav);
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.25rem;
        }

        .sender-details h4 {
            font-size: 1rem;
            font-weight: 600;
        }

        .sender-details p {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .email-body {
            line-height: 1.6;
            color: #334155;
            font-size: 1.05rem;
            white-space: pre-wrap;
        }

        /* Feedback Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: var(--text-primary);
            color: var(--white);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-icon {
            width: 20px;
            height: 20px;
        }

        .reward-badge {
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .reward-pos { color: var(--success); }
        .reward-neg { color: var(--danger); }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .empty-state i {
            width: 64px;
            height: 64px;
            margin-bottom: 24px;
            opacity: 0.5;
        }

        /* Transitions */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="/" class="logo" style="text-decoration: none;">
            <i data-lucide="mail"></i>
            <span>IntelliMail</span>
        </a>
        <nav class="nav-items">
            <div class="nav-item active">
                <i data-lucide="inbox"></i>
                <span>Inbox</span>
            </div>
            <div class="nav-item">
                <i data-lucide="alert-circle"></i>
                <span>Spam</span>
            </div>
            <div class="nav-item">
                <i data-lucide="star"></i>
                <span>Important</span>
            </div>
            <div class="nav-item">
                <i data-lucide="archive"></i>
                <span>Archive</span>
            </div>
        </nav>
        
        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-label">Total Reward</div>
                <div class="stat-value" id="reward-total">0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Processed</div>
                <div class="stat-value" id="processed-count">0 / 0</div>
            </div>
            <button class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 12px;" onclick="resetEnv()">
                <i data-lucide="refresh-cw"></i> Reset Environment
            </button>
        </div>
    </aside>

    <!-- Center List -->
    <main class="email-list-panel">
        <div class="panel-header">
            <h2 class="panel-title">Inbox</h2>
            <i data-lucide="sliders-horizontal" style="width: 18px; color: var(--text-secondary); cursor: pointer;"></i>
        </div>
        <div class="search-box">
            <i data-lucide="search"></i>
            <input type="text" placeholder="Search emails...">
        </div>
        <div class="list-container" id="email-list">
            <!-- Emails will be injected here -->
        </div>
    </main>

    <!-- Right Reader -->
    <section class="email-reader" id="reader-view">
        <div class="empty-state">
            <i data-lucide="mailbox"></i>
            <h3>Select an email to read</h3>
            <p>Your incoming emails will appear here for processing</p>
        </div>
    </section>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i data-lucide="check-circle" class="toast-icon"></i>
        <span id="toast-message">Action processed!</span>
        <span id="toast-reward" class="reward-badge"></span>
    </div>

    <script>
        let currentEmail = null;
        let isDone = false;

        async function resetEnv() {
            const response = await fetch('/reset', { method: 'POST' });
            const data = await response.json();
            updateState(data);
        }

        async function takeAction(action) {
            if (isDone || !currentEmail) return;

            const response = await fetch('/step', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action })
            });
            const data = await response.json();
            
            showToast(action, data.reward);
            updateState(data);
        }

        function updateState(data) {
            isDone = data.done;
            currentEmail = data.observation;

            // Update stats
            document.getElementById('reward-total').innerText = (data.total_reward || 0).toFixed(2);
            document.getElementById('reward-total').className = `stat-value ${(data.total_reward || 0) >= 0 ? '' : 'reward-neg'}`;
            document.getElementById('processed-count').innerText = `${data.processed_count} / ${data.inbox_size}`;

            // Update List
            const listContainer = document.getElementById('email-list');
            listContainer.innerHTML = '';

            if (currentEmail) {
                const item = document.createElement('div');
                item.className = 'email-item active fade-in';
                item.innerHTML = `
                    <div class="email-item-header">
                        <span class="sender">${currentEmail.sender}</span>
                        <span class="time">${currentEmail.timestamp ? new Date(currentEmail.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Now'}</span>
                    </div>
                    <div class="subject">${currentEmail.subject}</div>
                    <div class="snippet">${currentEmail.body}</div>
                    ${currentEmail.is_important ? '<span class="tag tag-important">Important</span>' : ''}
                `;
                listContainer.appendChild(item);

                // Update Reader
                const readerView = document.getElementById('reader-view');
                readerView.innerHTML = `
                    <div class="reader-toolbar">
                        <div class="action-buttons">
                            <button class="btn btn-primary" onclick="takeAction('classify')">
                                <i data-lucide="check-square"></i> Classify
                            </button>
                            <button class="btn" onclick="takeAction('archive')">
                                <i data-lucide="archive"></i> Archive
                            </button>
                            <button class="btn btn-danger" onclick="takeAction('delete')">
                                <i data-lucide="trash-2"></i> Delete
                            </button>
                        </div>
                    </div>
                    <div class="reader-content fade-in">
                        <div class="reader-header">
                            <h1 class="reader-subject">${currentEmail.subject}</h1>
                            <div class="sender-info">
                                <div class="avatar">${currentEmail.sender[0].toUpperCase()}</div>
                                <div class="sender-details">
                                    <h4>${currentEmail.sender}</h4>
                                    <p>To: me &lt;user@example.com&gt;</p>
                                </div>
                            </div>
                        </div>
                        <div class="email-body">${currentEmail.body}</div>
                    </div>
                `;
            } else if (isDone) {
                const readerView = document.getElementById('reader-view');
                readerView.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="party-popper"></i>
                        <h3>All caught up!</h3>
                        <p>You have processed all emails in the environment.</p>
                        <button class="btn btn-primary" style="margin-top: 20px" onclick="resetEnv()">Restart Session</button>
                    </div>
                `;
            }
            
            lucide.createIcons();
        }

        function showToast(action, reward) {
            const toast = document.getElementById('toast');
            const message = document.getElementById('toast-message');
            const rewardBadge = document.getElementById('toast-reward');

            message.innerText = `Email ${action}ed!`;
            rewardBadge.innerText = reward >= 0 ? `+${reward.toFixed(1)}` : reward.toFixed(1);
            rewardBadge.className = `reward-badge ${reward >= 0 ? 'reward-pos' : 'reward-neg'}`;

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Initialize Lucide icons
        lucide.createIcons();
        
        // Initial load
        resetEnv();
    </script>
</body>
</html>
